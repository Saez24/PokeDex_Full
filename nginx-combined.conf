server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── API → gunicorn (intern auf Port 8000) ────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Statische Assets (Content-Hash → sicher lang cachen) ─────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── ngsw Service-Worker-Manifest nie cachen ───────────────────────────────
    location = /ngsw.json {
        expires 0;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── SPA-Routing: alle unbekannten Pfade → index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
