name: Publish PokéDex Fullstack Image

on:
  push:
    branches:
      - production
    tags:
      - "v*"
    paths:
      - "frontend/**"
      - "backend/**"
      - "Dockerfile"
      - "nginx-combined.conf"
      - "supervisord.conf"
      - "entrypoint-combined.sh"
      - ".github/workflows/publish-app.yml"

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost/test"
          REDIS_URL: "redis://localhost:6379"
        run: python3 -m pytest tests/ -v

  build-and-push:
    name: Build & Push Fullstack Image
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: vars
        run: echo "owner_lowercase=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lowercase }}/pokedex-app:latest
            ${{ github.ref_name != '' && format('ghcr.io/{0}/pokedex-app:{1}', steps.vars.outputs.owner_lowercase, github.ref_name) || '' }}
          build-args: |
            VERSION=${{ github.ref_name != '' && github.ref_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
